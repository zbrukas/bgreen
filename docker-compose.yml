services:
  postgres:
    image: postgres:16
    container_name: bgreen-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bgreen
      POSTGRES_PASSWORD: bgreen_dev
      POSTGRES_DB: bgreen
    volumes:
      - bgreen-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bgreen"]
      interval: 5s
      timeout: 5s
      retries: 10

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: bgreen-gotenberg
    # Host 3001 belongs to apps/cs (next dev). Gotenberg listens on 3010
    # to keep them from racing for the same port at startup.
    ports:
      - "3010:3000"
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=60s"

  mailpit:
    image: axllent/mailpit:latest
    container_name: bgreen-mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

  # Local S3-compatible target for IES upload + extraction (V6 onward).
  # Production uses real S3 in eu-central-1 / eu-west-1; this stand-in keeps
  # dev hermetic and avoids surprise AWS bills from a runaway test loop.
  # Console at http://localhost:9001 (user: bgreen / pw: bgreen_dev).
  minio:
    image: minio/minio:latest
    container_name: bgreen-minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    environment:
      MINIO_ROOT_USER: bgreen
      MINIO_ROOT_PASSWORD: bgreen_dev
    command: server /data --console-address ":9001"
    volumes:
      - bgreen-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job: create the bgreen-dev bucket on first compose-up. Idempotent
  # — the `mb --ignore-existing` skips if it's already there.
  minio-bootstrap:
    image: minio/mc:latest
    container_name: bgreen-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 bgreen bgreen_dev &&
      mc mb --ignore-existing local/bgreen-dev
      "

volumes:
  bgreen-postgres-data:
  bgreen-minio-data:
