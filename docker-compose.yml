services:
  postgres:
    image: postgres:16
    container_name: bgreen-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bgreen
      POSTGRES_PASSWORD: bgreen_dev
      POSTGRES_DB: bgreen
    volumes:
      - bgreen-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bgreen"]
      interval: 5s
      timeout: 5s
      retries: 10

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: bgreen-gotenberg
    # Host 3001 belongs to apps/cs (next dev). Gotenberg listens on 3010
    # to keep them from racing for the same port at startup.
    ports:
      - "3010:3000"
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=60s"

  mailpit:
    image: axllent/mailpit:latest
    container_name: bgreen-mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

volumes:
  bgreen-postgres-data:
